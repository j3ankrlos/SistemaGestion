<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Porcino</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='sweetalert2/sweetalert2.min.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2><i class="fa-solid fa-piggy-bank" style="color: var(--accent); margin-right: 10px;"></i>Acceso al Sistema</h2>
            
            <div id="flash-messages" style="display:none;"
                 data-messages='{{ get_flashed_messages(with_categories=true) | tojson | safe }}'>
            </div>

            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" class="form-control" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" name="clave" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='sweetalert2/sweetalert2.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
