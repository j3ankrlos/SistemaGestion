<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso · Sistema Porcino</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/inter.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='fontawesome/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='sweetalert2/sweetalert2.min.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-emblema">
                <i class="fa-solid fa-piggy-bank"></i>
            </div>
            <h1 class="auth-title">Sistema Porcino</h1>
            <p class="auth-desc">Ingresa tus credenciales para acceder</p>

            <div id="flash-messages" style="display:none;"
                 data-messages='{{ get_flashed_messages(with_categories=true) | tojson | safe }}'>
            </div>

            <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="usuario" name="usuario" class="form-control" required autocomplete="off" placeholder="Ingresa tu usuario">
                    </div>
                </div>
                <div class="form-group">
                    <label for="clave">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="clave" name="clave" class="form-control" required placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    Ingresar
                </button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='sweetalert2/sweetalert2.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
